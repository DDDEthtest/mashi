services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:rw
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - ionos
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:rw
      - /var/www/certbot:/var/www/certbot:rw
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: >
      /bin/sh -c "apk add --no-cache docker-cli;
      trap exit TERM; 
      while :; do 
        certbot renew --webroot -w /var/www/certbot --quiet --deploy-hook 'docker exec nginx nginx -s reload'; 
        sleep 12h & wait $${!}; 
      done;"
    networks:
      - ionos

networks:
  ionos:
    external: true