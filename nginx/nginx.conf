# --- PORT 80: SHARED REDIRECTS & CERTBOT ---
server {
    listen 80;
    server_name katzemon.com www.katzemon.com mashiverse.com www.mashiverse.com;

    # Keep this for SSL certificate renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- MASHIVERSE (Port 443) ---
server {
    listen 443 ssl;
    server_name mashiverse.com www.mashiverse.com;

    ssl_certificate     /etc/letsencrypt/live/mashiverse.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mashiverse.com/privkey.pem;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $target http://172.17.0.1:8080; # Point to Mashiverse app port
        proxy_pass $target;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# --- KATZEMON (Port 443) ---
server {
    listen 443 ssl;
    server_name katzemon.com www.katzemon.com;

    ssl_certificate     /etc/letsencrypt/live/katzemon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/katzemon.com/privkey.pem;

    location / {
        resolver 127.0.0.11 valid=30s;
        # If Katzemon's site is on port 3000 inside the container:
        set $target http://mashi:3000;
        proxy_pass $target;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}